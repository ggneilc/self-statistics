name: Tests & Coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        env:
          DJANGO_SETTINGS_MODULE: selfstats.settings.ci
        run: |
          coverage run --source='.' --omit='*/migrations/*,*/settings/*,manage.py,selfstats/*' manage.py test --verbosity=2

      - name: Generate coverage report
        run: coverage report --format=markdown >> $GITHUB_STEP_SUMMARY

      - name: Generate HTML coverage report
        run: coverage html

      - name: Upload HTML coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 14

      - name: Fail if coverage below 50%
        run: coverage report --fail-under=50
