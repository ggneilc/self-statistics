services:
    web:
      build: .
      container_name: selfstats-web
      env_file:
        - /home/github-runner/selfstats.env
      environment:
        - DJANGO_SETTINGS_MODULE=selfstats.settings.prod
      volumes:
        - static_volume:/app/staticfiles
      restart: unless-stopped

    nginx:
      image: nginx:alpine
      container_name: selfstats-proxy
      ports:
        - "80:80"
      volumes:
        - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
        - static_volume:/var/www/static:ro
      depends_on:
        - web
      restart: unless-stopped

    tunnel:
      image: cloudflare/cloudflared:latest
      container_name: selfstats-tunnel
      restart: unless-stopped

      command: tunnel run --token ${CLOUDFLARE_TUNNEL_TOKEN}

volumes:
  static_volume: