<form id="t_entry_form"
      hx-post="{% url 'workouts:addt' %}"
      hx-target="#wtypes-list">

  {% csrf_token %}

  <div class="form-field" style="flex: 3;">
    <label for="{{ form.name.id_for_label }}">Workout Type Name</label>
    {{form.name}}
  </div>

  <div class="form-field" style="flex: 1;">
    <label for="{{ form.color.id_for_label }}">Color</label>
    {{form.color}}
  </div>

  <div class="form-field" style="flex: 3;">
    <label for="bodyparts-toggle">Bodyparts</label>
    <details id="bodyparts-toggle" class="bodyparts-dropdown">
      <summary>
        <span class="bodyparts-summary">Select bodyparts…</span>
      </summary>
      <div class="bodyparts-checkboxes">
        {% for code, name in bodyparts %}
        <label class="bodyparts-option">
          <input type="checkbox" name="bodyparts" value="{{ code }}"
                 {% if code in selected_bodyparts %}checked{% endif %}>
          {{ name }}
        </label>
        {% endfor %}
      </div>
    </details>
  </div>

  <div class="form-field" style="flex: 1; padding-top: 1.5rem; display: flex; align-items: center; justify-content: center; gap: 0.5rem;">
  <button class="outline" type="submit" style="flex: 1;"
    hx-on:click="document.getElementById('wtype-editor').classList.add('hidden')">
    Create
  </button>
  <button type="button" class="delete-btn" style="flex: 1;"
    hx-on:click="document.getElementById('wtype-editor').classList.add('hidden')">
    Cancel
  </button>
  </div>
</form>
