<form
    {% if from == 'lift' %}
    hx-post="{% url 'workouts:add_custom_mv' %}?from=lift"
    hx-target="#lift-target"
    hx-swap="outerHTML"
    hx-on::after-request="if(event.detail.successful){ var c=document.getElementById('lift-selection-container'); if(c){ c.innerHTML=''; } }"
    {% else %}
    hx-post="{% url 'workouts:add_custom_mv' %}"
    hx-target="#overview-target"
    {% endif %}>
    {% csrf_token %}

    <fieldset role="group"
        {% if from == 'lift' %}
        style="flex-direction: column;"
        {% endif %}>
        {{ form.name }}
        {{ form.bodypart }}
        {{ form.category }}
        {{ form.secondary_bodypart }}
    </fieldset>

    <button type="submit">Create Movement</button>
</form>
