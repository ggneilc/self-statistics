<div id="lift-chart-container" data-lifts='{{ data|safe }}'
style="width:100%; height:100%; display:flex;"></div>

<script>
(function() {
    const container = document.getElementById("lift-chart-container");
    if (!container) return;

    let data;
    try {
        data = JSON.parse(container.dataset.lifts);
    } catch (err) {
        console.error("Invalid lift data:", err);
        return;
    }

    const parseDate = d3.isoParse;
    data.forEach(d => { d.date = parseDate(d.date); });

    const margin = { top: 20, right: 30, bottom: 40, left: 50 };

    // Create the SVG once, let ResizeObserver update it
    const svgEl = d3.select(container)
        .append("svg")
        .style("width", "100%")
        .style("height", "100%")
        .style("display", "block");

    const g = svgEl.append("g")
        .attr("transform", `translate(${margin.left},${margin.top})`);

    // Persistent axis/line/dot groups so we update rather than redraw
    const xAxisG = g.append("g").attr("class", "x-axis");
    const yAxisG = g.append("g").attr("class", "y-axis");
    const linePath = g.append("path").attr("fill", "none")
        .attr("stroke", "var(--pico-primary)")
        .attr("stroke-width", 2);
    const dotsG = g.append("g").attr("class", "dots");
    const emptyText = g.append("text")
        .attr("text-anchor", "middle")
        .style("font-size", "14px")
        .style("fill", "var(--pico-muted-color)")
        .text("Perform 2 lifts to see trends")
        .style("display", "none");

    function render(width, height) {
        const innerW = width - margin.left - margin.right;
        const innerH = height - margin.top - margin.bottom;

        if (data.length < 2) {
            linePath.style("display", "none");
            dotsG.style("display", "none");
            xAxisG.style("display", "none");
            yAxisG.style("display", "none");
            emptyText
                .style("display", null)
                .attr("x", innerW / 2)
                .attr("y", innerH / 2);
            return;
        }

        emptyText.style("display", "none");
        linePath.style("display", null);
        dotsG.style("display", null);
        xAxisG.style("display", null);
        yAxisG.style("display", null);

        const x = d3.scaleTime()
            .domain(d3.extent(data, d => d.date))
            .range([0, innerW]);

        const y = d3.scaleLinear()
            .domain([d3.min(data, d => d.one_rm) * 0.9, d3.max(data, d => d.one_rm) * 1.1])
            .range([innerH, 0]);

        xAxisG
            .attr("transform", `translate(0,${innerH})`)
            .call(d3.axisBottom(x).ticks(5));

        yAxisG.call(d3.axisLeft(y));

        const line = d3.line()
            .x(d => x(d.date))
            .y(d => y(d.one_rm))
            .curve(d3.curveMonotoneX);

        linePath.datum(data).attr("d", line);

        // Dots with hover titles (data-join safe across resizes)
        const dots = dotsG.selectAll("circle").data(data, d => d.date);
        const dotsEnter = dots.enter()
            .append("circle")
            .attr("r", 5)
            .attr("fill", "var(--pico-primary)");

        // Ensure each circle has a <title> child for tooltip
        dotsEnter.append("title");

        const allDots = dots.merge(dotsEnter)
            .attr("cx", d => x(d.date))
            .attr("cy", d => y(d.one_rm));

        allDots.select("title")
            .text(d => `${d.one_rm} lbs on ${d.date.toLocaleDateString()}`);

        dots.exit().remove();
    }

    // Observe container size and re-render on change
    const ro = new ResizeObserver(entries => {
        for (const entry of entries) {
            const { width, height } = entry.contentRect;
            if (width > 0 && height > 0) render(width, height);
        }
    });
    ro.observe(container);

    // Initial render in case ResizeObserver doesn't fire for the first layout
    const rect = container.getBoundingClientRect();
    if (rect.width > 0 && rect.height > 0) {
        render(rect.width, rect.height);
    }
})();
</script>
