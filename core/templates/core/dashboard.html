<div class="horizontal-group dashboard-columns">
	<div id="day-area">
		<article id="calendar-container">
			<header class="calendar-header">
				<div class="streak" hx-get="{% url 'core:curr_streak' %}" hx-trigger="load"></div>
				<div class="calendar-prev"><button id="prev" class="outline">«</button></div>
				<div class="calendar-range"><strong id="current-range">Range</strong></div>
				<div class="calendar-next"><button id="next" class="outline">»</button></div>
			</header>
			<div hx-get="{% url 'graphs:calendar' %}" hx-trigger="load"></div>
		</article>

		<article id="day-container" class="vertical-group">
		</article>
		<script>
			(function () {
				const date_container = document.getElementById('hidden-date');
				const date = date_container.value;
				console.log(date);
				htmx.ajax('GET', `/day/${date}`, { target: '#day-container' });
			})();
		</script>
	</div>
	{% if day_count >= 7 %}
	<article id="graph-area" style="padding-bottom: 1rem;">
		<header style="position:relative;">
			<i class="fa-solid fa-chart-line"></i>
			Analytics
			<span class="header-buttons" style="position:absolute; right:1rem;">

				<button class="bw-timeframe-btn active" type="button" data-range="all"
					data-tooltip="All Time" data-placement="bottom">
					<i class="fa-solid fa-calendar-days"></i>
				</button>
				<button class="bw-timeframe-btn" type="button" data-range="30"
					data-tooltip="Monthly" data-placement="bottom">
					<i class="fa-solid fa-calendar-week"></i>
				</button>
				<button class="bw-timeframe-btn" type="button" data-range="7"
					data-tooltip="Weekly" data-placement="bottom">
					<i class="fa-solid fa-calendar-day"></i>
				</button>


				<button data-tooltip="Coming Soon" data-placement="bottom" style="padding:0 0.3rem;">
					<i class="fa-solid fa-chart-column"></i>
				</button>
			</span>
		</header>

		<div class="vertical-group" style="flex: 1;">

			<div id="graph" hx-get="{% url 'graphs:main-graph' %}" hx-trigger="load, bodyweightUpdated from:body" style="position:relative;"></div>

			<div class="horizontal-group" style="flex:2;">
				<article id="bw-summary" class="vertical-group" style="height: revert;margin-bottom: 0;"
				hx-get="{% url 'graphs:bw-summary' %}" hx-trigger="load, bodyweightUpdated from:body">
				</article>
				<article id="cal-summary" class="vertical-group" style="height: revert;margin-bottom: 0;"
				hx-get="{% url 'graphs:nutrition-summary' %}" hx-trigger="load">
				</article>
			</div>

		</div>

	</article>

	{% else %}
	<article id="graph-area" class="locked">
		<i class="fa-solid fa-lock locked-analytics-icon"></i>
		<h2 class="locked-analytics-title">Analytics Locked</h2>
		<p class="locked-analytics-description">
			Track <strong>7 days</strong> of data to unlock personalized analytics and insights.
		</p>
		<div class="locked-analytics-progress-track">
			<div class="locked-analytics-progress-bar" style="width: {% widthratio day_count 7 100 %}%;"></div>
		</div>
		<p class="locked-analytics-count">{{ day_count }} / 7 days tracked</p>
	</article>
	{% endif %}
</div>
