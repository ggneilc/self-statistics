<dialog open>
<article id="profile-article">
<div id="profile-container" class="horizontal-group">

	<nav id="profile-nav">
		<ul id="profile-list">
			<li class="profile-item">
				<button class="profile-btn active"
					hx-get="{% url 'core:info_setting' %}"
					hx-trigger="click"
					hx-swap="innerHTML"
					hx-target="#profile-main"
					onclick="document.querySelectorAll('.profile-btn').forEach(b => b.classList.remove('active')); this.classList.add('active');">
					<i class="fa-solid fa-user"></i>
					<span class="profile-btn-label">Info</span>
				</button>
			</li>
			<li class="profile-item">
				<button class="profile-btn"
					hx-get="{% url 'core:theme_setting' %}"
					hx-trigger="click"
					hx-swap="innerHTML"
					hx-target="#profile-main"
					onclick="document.querySelectorAll('.profile-btn').forEach(b => b.classList.remove('active')); this.classList.add('active');">
					<i class="fa-solid fa-palette"></i>
					<span class="profile-btn-label">Theme</span>
				</button>
			</li>
			<li class="profile-item">
				<button class="profile-btn"
					hx-get="{% url 'core:food_setting' %}"
					hx-trigger="click"
					hx-swap="innerHTML"
					hx-target="#profile-main"
					onclick="document.querySelectorAll('.profile-btn').forEach(b => b.classList.remove('active')); this.classList.add('active');">
					<i class="fa-solid fa-utensils"></i>
					<span class="profile-btn-label">Foods</span>
				</button>
			</li>
			<li class="profile-item">
				<button class="profile-btn"
					hx-get="{% url 'core:graph_setting' %}"
					hx-trigger="click"
					hx-swap="innerHTML"
					hx-target="#profile-main"
					onclick="document.querySelectorAll('.profile-btn').forEach(b => b.classList.remove('active')); this.classList.add('active');">
					<i class="fa-solid fa-chart-line"></i>
					<span class="profile-btn-label">Graphs</span>
				</button>
			</li>
			<li class="profile-item">
				<button class="profile-btn"
					hx-get="{% url 'core:workout_setting' %}"
					hx-target="#profile-main"
					onclick="document.querySelectorAll('.profile-btn').forEach(b => b.classList.remove('active')); this.classList.add('active');">
					<i class="fa-solid fa-dumbbell"></i>
					<span class="profile-btn-label">Workouts</span>
				</button>
			</li>
		</ul>

		<div class="profile-nav-footer">
			<button class="profile-close-btn"
				hx-get="{% url 'core:close_profile' %}"
				hx-swap="innerHTML"
				hx-target="#dummy"
				onclick="event.stopPropagation()">
				<i class="fa fa-xmark"></i>
				<span class="profile-btn-label">Close</span>
			</button>
		</div>
	</nav>

	<div id="profile-main">
		{% include './personal_info.html' with user=user %}
		<!-- Mobile only: logout sits below settings content -->
	</div>

</div>
</article>
</dialog>
